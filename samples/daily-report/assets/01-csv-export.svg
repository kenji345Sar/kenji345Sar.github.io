<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" role="img" aria-label="CSV出力ダイアログのワイヤーフレーム">
  <defs>
    <style>
      .label { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; }
      .h { font-size: 14px; font-weight: 700; fill: #1f1f1f; }
      .t { font-size: 12px; fill: #1f1f1f; }
      .m { font-size: 11px; fill: #666; }
      .mono { font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 11px; fill: #1f1f1f; }
    </style>
  </defs>
  <rect width="800" height="460" fill="#ffffff"/>

  <text x="400" y="28" text-anchor="middle" class="label h" font-size="16">S3. CSV出力（既存Excel書式互換）</text>

  <!-- dialog -->
  <g transform="translate(60,60)">
    <rect x="0" y="0" width="380" height="320" rx="8" fill="#ffffff" stroke="#1f1f1f" stroke-width="1.5"/>
    <rect x="0" y="0" width="380" height="36" fill="#f0f0ee"/>
    <text x="20" y="24" class="label" font-size="13" font-weight="700">CSV出力</text>
    <text x="360" y="24" text-anchor="end" class="label m">×</text>

    <text x="20" y="64" class="label m">期間</text>
    <rect x="20" y="72" width="160" height="24" rx="3" fill="#ffffff" stroke="#cccccc"/>
    <text x="28" y="89" class="label t">2026-04-01</text>
    <text x="190" y="89" class="label t">〜</text>
    <rect x="200" y="72" width="160" height="24" rx="3" fill="#ffffff" stroke="#cccccc"/>
    <text x="208" y="89" class="label t">2026-04-30</text>

    <text x="20" y="120" class="label m">配送員</text>
    <rect x="20" y="128" width="340" height="24" rx="3" fill="#ffffff" stroke="#cccccc"/>
    <text x="28" y="145" class="label t">全員　▾</text>

    <text x="20" y="176" class="label m">文字コード</text>
    <rect x="20" y="184" width="100" height="22" rx="11" fill="#2563eb"/>
    <text x="70" y="199" text-anchor="middle" class="label t" font-weight="700" fill="#ffffff">Shift_JIS</text>
    <rect x="128" y="184" width="120" height="22" rx="11" fill="#ffffff" stroke="#1f1f1f"/>
    <text x="188" y="199" text-anchor="middle" class="label t">UTF-8 (BOM付)</text>

    <text x="20" y="232" class="label m">列順</text>
    <rect x="20" y="240" width="340" height="22" rx="3" fill="#f7f7f5" stroke="#e5e5e5"/>
    <text x="28" y="256" class="label" font-size="11" fill="#1f1f1f">既存Excel月次集計と同じ列順（変更不可）</text>

    <rect x="20" y="276" width="340" height="22" rx="3" fill="#fff7ed" stroke="#ea580c"/>
    <text x="28" y="291" class="label" font-size="11" fill="#9a3412">⚠ 既存Excelマクロを壊さないため、列順は固定運用</text>

    <!-- buttons -->
    <rect x="220" y="360" width="60" height="28" fill="none"/>
  </g>

  <!-- buttons under dialog -->
  <g transform="translate(60,400)">
    <rect x="200" y="-20" width="80" height="28" rx="3" fill="#ffffff" stroke="#1f1f1f"/>
    <text x="240" y="-2" text-anchor="middle" class="label t">キャンセル</text>
    <rect x="290" y="-20" width="90" height="28" rx="3" fill="#2563eb"/>
    <text x="335" y="-2" text-anchor="middle" class="label t" font-weight="700" fill="#ffffff">ダウンロード</text>
  </g>

  <!-- output sample -->
  <g transform="translate(470,60)">
    <text x="0" y="0" class="label h">出力CSV（先頭3行・抜粋）</text>
    <rect x="0" y="12" width="290" height="170" rx="6" fill="#0b1020" stroke="#1f2a44"/>
    <text x="12" y="34" class="mono" fill="#9fc6ff">日付,配送員,便,配送先コード,</text>
    <text x="12" y="50" class="mono" fill="#9fc6ff">配送先名,品目,数量,異常,メモ</text>
    <text x="12" y="78" class="mono" fill="#e2e8f0">2026-04-01,佐藤,午前,K0102,</text>
    <text x="12" y="94" class="mono" fill="#e2e8f0">○○食堂,日本酒一升瓶,12,,通常</text>
    <text x="12" y="122" class="mono" fill="#e2e8f0">2026-04-01,佐藤,午前,K0118,</text>
    <text x="12" y="138" class="mono" fill="#e2e8f0">△△レストラン,醤油5L,6,</text>
    <text x="12" y="154" class="mono" fill="#e2e8f0">積み残し,在庫切れ</text>

    <text x="0" y="210" class="label h">設計の考え方</text>
    <circle cx="6" cy="232" r="3" fill="#2563eb"/>
    <text x="16" y="236" class="label t">移行コスト最小化のため列順は既存Excelと一致</text>
    <circle cx="6" cy="258" r="3" fill="#2563eb"/>
    <text x="16" y="262" class="label t">Shift_JIS対応（既存マクロが前提）</text>
    <circle cx="6" cy="284" r="3" fill="#2563eb"/>
    <text x="16" y="288" class="label t">第1版完了時に過去1ヶ月分を再生成して旧Excelと完全一致確認</text>
    <circle cx="6" cy="310" r="3" fill="#2563eb"/>
    <text x="16" y="314" class="label t">「Web化したらExcelが壊れた」を絶対に起こさない</text>
  </g>
</svg>
